<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chat - Agentic AI</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f0f;
      color: #e4e4e7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      padding: 12px 20px;
      border-bottom: 1px solid #27272a;
      font-weight: 600;
      font-size: 14px;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      max-width: 768px;
      margin: 0 auto;
      width: 100%;
    }
    .msg {
      margin-bottom: 24px;
      display: flex;
      gap: 12px;
    }
    .msg.user { flex-direction: row-reverse; }
    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }
    .msg.user .msg-avatar { background: #3b82f6; }
    .msg.assistant .msg-avatar { background: #22c55e; }
    .msg-content {
      flex: 1;
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.6;
      font-size: 15px;
    }
    .msg.user .msg-content { background: #27272a; }
    .msg.assistant .msg-content { background: #18181b; }
    .msg-content h1, .msg-content h2, .msg-content h3 { margin-top: 1em; margin-bottom: 0.5em; }
    .msg-content pre { background: #27272a; padding: 12px; border-radius: 8px; overflow-x: auto; }
    .msg-content code { background: #27272a; padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
    .msg-content pre code { background: none; padding: 0; }
    .msg-content p { margin: 0.5em 0; }
    .msg-content ul, .msg-content ol { margin: 0.5em 0; padding-left: 1.5em; }
    .input-area {
      padding: 16px 20px 24px;
      max-width: 768px;
      margin: 0 auto;
      width: 100%;
    }
    .input-wrap {
      display: flex;
      gap: 8px;
      background: #27272a;
      border-radius: 12px;
      padding: 8px 12px;
      border: 1px solid #3f3f46;
    }
    .input-wrap:focus-within { border-color: #3b82f6; }
    #input {
      flex: 1;
      background: none;
      border: none;
      color: #e4e4e7;
      font-size: 15px;
      outline: none;
      resize: none;
      min-height: 24px;
      max-height: 200px;
    }
    #input::placeholder { color: #71717a; }
    #send {
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 14px;
      cursor: pointer;
      align-self: flex-end;
    }
    #send:hover { background: #2563eb; }
    #send:disabled { background: #52525b; cursor: not-allowed; }
    .thinking {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 12px 16px;
      color: #a1a1aa;
      font-size: 14px;
    }
    .thinking-dots span {
      animation: blink 1.4s infinite;
    }
    .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
    .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.3; }
      40% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="header">Chat — Agentic AI（支持搜索）</div>
  <div class="messages" id="messages"></div>
  <div class="input-area">
    <div class="input-wrap">
      <textarea id="input" rows="1" placeholder="输入消息，回车发送..." autofocus></textarea>
      <button id="send">发送</button>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');

    let chatHistory = [];

    function addMsg(role, content, isThinking = false) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      const avatar = role === 'user' ? '你' : 'AI';
      let body = '';
      if (isThinking) {
        body = '<div class="thinking"><span>正在思考</span><span class="thinking-dots"><span>.</span><span>.</span><span>.</span></span></div>';
      } else if (role === 'assistant' && typeof content === 'string') {
        body = '<div class="msg-body">' + (marked.parse(content) || '') + '</div>';
      } else {
        body = '<div class="msg-body">' + (content || '').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>') + '</div>';
      }
      div.innerHTML = `<div class="msg-avatar">${avatar}</div><div class="msg-content">${body}</div>`;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    function replaceThinkingWithContent(el, content) {
      if (el && el.querySelector('.thinking')) {
        el.querySelector('.msg-content').innerHTML = '<div class="msg-body">' + (marked.parse(content) || '') + '</div>';
      }
    }

    async function send() {
      const text = inputEl.value.trim();
      if (!text) return;
      inputEl.value = '';
      sendBtn.disabled = true;

      addMsg('user', text);
      chatHistory.push({ role: 'user', content: text });
      const thinkingDiv = addMsg('assistant', '', true);

      try {
        const resp = await fetch('/v1/chat/completions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'gpt-5',
            messages: chatHistory,
            max_tokens: 2000,
          }),
        });
        const data = await resp.json();
        if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
        const content = data.choices?.[0]?.message?.content || '';
        chatHistory.push({ role: 'assistant', content });
        replaceThinkingWithContent(thinkingDiv, content);
      } catch (err) {
        replaceThinkingWithContent(thinkingDiv, '**错误：** ' + err.message);
      } finally {
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    sendBtn.onclick = send;
    inputEl.onkeydown = (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    };
  </script>
</body>
</html>
